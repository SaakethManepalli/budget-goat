name: BudgetGoat
options:
  bundleIdPrefix: com.budgetgoat
  deploymentTarget:
    iOS: "17.4"
  developmentLanguage: en
  xcodeVersion: "15.3"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.4"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete
    GENERATE_INFOPLIST_FILE: NO

packages:
  BudgetGoatPackage:
    path: .

targets:
  BudgetGoat:
    type: application
    platform: iOS
    sources:
      - path: App/BudgetGoat
    resources:
      - path: App/BudgetGoat/Assets.xcassets
    info:
      path: App/BudgetGoat/Info.plist
    entitlements:
      path: App/BudgetGoat/BudgetGoat.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.budgetgoat.app
        INFOPLIST_FILE: App/BudgetGoat/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/BudgetGoat/BudgetGoat.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: BudgetGoatPackage
        product: BudgetCore
      - package: BudgetGoatPackage
        product: BudgetData
      - package: BudgetGoatPackage
        product: SecureStorage
      - package: BudgetGoatPackage
        product: PlaidKit
      - package: BudgetGoatPackage
        product: TransactionEngine
      - package: BudgetGoatPackage
        product: BudgetUI
